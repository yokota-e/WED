<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@4.0.1/destyle.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <header class="l-header">
    <div class="l-header-inner">
      <h1>
        <a href="index.html"><img src="./img/logo.png" alt="WED" class="l-logo" /></a>
      </h1>
      <div class="l-headerlink">
        <ul class="l-nav">
          <li><a href="../news.html">NEWS</a></li>
          <li><a href="../index.html#ABOUT">ABOUT</a></li>
          <li><a href="../index.html#BUSINESS">BUSINESS</a></li>
          <li><a href="../index.html#COMPANY">COMPANY</a></li>
        </ul>
        <a href="../contact.html" class="c-contact">お問い合わせ</a>
      </div>
    </div>
  </header>
  <main class="l-main l-wrapper" id="contact">
    <section class="l-contact l-section">
      <h2 data-sub="Contact" class="l-title c-title">お問い合わせ</h2>
      <form action="#" method="post" class="l-form">
        <p class="l-contact-text">
          お仕事のご依頼やご相談は下記のフォームからお問い合わせください。
        </p>
        <ul class="l-contact-list">
          <li>
            <label for="name" class="c-required">Name</label><br />
            <input type="text" name="name" id="name" class="c-contact__input" required>
          </li>
          <li>
            <label for="email" class="c-required">E-mail</label><br />
            <input type="text" name="email" id="email" class="c-contact__input" required>
          </li>
          <li>
            <label for="message" class="c-required">Message</label><br />
            <textarea name="message" id="message" class="c-contact__input" required></textarea>
          </li>
        </ul>
        <input type="submit" value="送信" class="c-btn-submit">
      </form>
    </section>
  </main>
  <footer class="l-footer">
    <div class="l-wrapper">
      <div class="l-footer__cnt">
        <img src="./img/logo.png" alt="WED" class="c-logo" />
        <address class="l-footer__cnt__address">
          <p>
            Web Entertainment Design Inc. <br />
            West Building 3F <br />
            9-99 Sakuragaokacho Shibuya-ku <br />
            Tokyo, Japan 150-0031 <br />
            T/99-9999-9999
          </p>
        </address>
      </div>
      <small>© Web Entertainment Design Inc.</small>
    </div>
  </footer>
  <script src="js/main.js"></script>
</body>

</html>
